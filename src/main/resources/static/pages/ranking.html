<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소셜 랭킹 | Smart Study AI</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa;--surface:#fff;--border:#e4e6ef;
  --text1:#1a1d27;--text2:#5a5f7a;--text3:#9499b5;
  --accent:#4f6ef7;--accent-bg:#eef1fe;--accent-border:#c7d4fc;
  --gold:#f59e0b;--silver:#9ca3af;--bronze:#cd7c2f;--green:#22c55e;
  --radius:14px;--shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text1);padding:32px}
.page-wrap{max-width:760px;margin:0 auto}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--text2);margin-bottom:28px}
.my-banner{background:#4f6ef7;border-radius:var(--radius);padding:20px 24px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;color:#fff;box-shadow:0 4px 20px rgba(79,110,247,.3)}
.my-left{display:flex;align-items:center;gap:16px}
.my-rank-num{font-size:36px;font-weight:800;line-height:1}
.my-name{font-size:15px;font-weight:600;margin-bottom:3px}
.my-major{font-size:12px;opacity:.8}
.my-change{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;margin-top:6px}
.my-right{text-align:right}
.my-score{font-size:28px;font-weight:800}
.my-score-label{font-size:12px;opacity:.7;margin-top:2px}
.controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.tab-group{display:flex;gap:4px}
.tab{font-family:'Pretendard',sans-serif;font-size:13px;font-weight:500;padding:7px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.podium{display:flex;justify-content:center;align-items:flex-end;gap:12px;margin-bottom:24px}
.podium-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.podium-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;position:relative}
.podium-crown{position:absolute;top:-14px;font-size:18px}
.av1{box-shadow:0 0 0 3px #fef3c7}.av2{box-shadow:0 0 0 3px #f3f4f6}.av3{box-shadow:0 0 0 3px #fde8d0}
.podium-base{display:flex;flex-direction:column;align-items:center;border-radius:8px 8px 0 0;width:100px;padding:10px 8px;font-size:12px;font-weight:600}
.base1{background:#fef3c7;color:#92400e;height:80px;justify-content:flex-end}
.base2{background:#f3f4f6;color:#374151;height:60px;justify-content:flex-end}
.base3{background:#fde8d0;color:#7c2d12;height:44px;justify-content:flex-end}
.podium-score{font-size:11px;font-weight:400;opacity:.7;margin-top:2px}
.podium-name{font-size:13px;font-weight:700}
.podium-rank{font-size:22px;margin-bottom:4px}
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.rank-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);transition:background .1s}
.rank-item:last-child{border-bottom:none}
.rank-item:hover{background:#f8f9ff}
.rank-item.is-me{background:var(--accent-bg);border-left:3px solid var(--accent)}
.rank-num{width:28px;text-align:center;font-size:14px;font-weight:700;color:var(--text3);flex-shrink:0}
.rank-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.me-tag{font-size:10px;background:var(--accent);color:#fff;padding:1px 6px;border-radius:4px;margin-left:6px;font-weight:600;vertical-align:middle}
.rank-major{font-size:12px;color:var(--text3);margin-top:2px}
.rank-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.rank-bar-wrap{width:120px}
.rank-bar-bg{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.rank-score{font-size:13px;font-weight:700;color:var(--text2);min-width:52px;text-align:right}
.rank-change{font-size:11px;min-width:28px;text-align:right}
.ch-up{color:var(--green)}.ch-dn{color:var(--red,#ef4444)}.ch-same{color:var(--text3)}
.load-more{width:100%;padding:14px;border:none;border-top:1px solid var(--border);background:var(--surface);color:var(--accent);font-family:'Pretendard',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border-radius:0 0 var(--radius) var(--radius);transition:background .12s}
.load-more:hover{background:var(--accent-bg)}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;display:block}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-msg{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:14px 18px;border-radius:10px;font-size:14px;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="page-wrap">
  <h1 class="page-title">🏆 소셜 랭킹</h1>
  <p class="page-sub">같은 공간에서 공부하는 학습자들과 선의의 경쟁을 해보세요</p>
  <div id="errorMsg" class="error-msg">데이터를 불러오지 못했습니다.</div>

  <div class="my-banner" id="myBanner">
    <div class="my-left">
      <div class="my-rank-num" id="myRankNum"><span class="skeleton" style="width:50px;height:36px"></span></div>
      <div>
        <div class="my-name" id="myName"><span class="skeleton" style="width:80px;height:15px"></span></div>
        <div class="my-major" id="myMajor"></div>
        <div class="my-change" id="myChange" style="display:none"></div>
      </div>
    </div>
    <div class="my-right">
      <div class="my-score" id="myScore"><span class="skeleton" style="width:60px;height:28px"></span></div>
      <div class="my-score-label">이번 달 학습 시간</div>
    </div>
  </div>

  <div class="controls">
    <div class="tab-group">
      <button class="tab on" onclick="switchScope(this,'all')">전체</button>
      <button class="tab" onclick="switchScope(this,'major')">동일 전공</button>
    </div>
    <span style="font-size:13px;color:var(--text3)">이번 달 기준</span>
  </div>

  <div class="podium" id="podium"></div>
  <div class="rank-card">
    <div id="rankList"></div>
    <button class="load-more" id="loadMoreBtn" onclick="loadMore()" style="display:none">더 보기</button>
  </div>
</div>

<script>
const AVATAR_COLORS = ['#4f6ef7','#22c55e','#f59e0b','#ef4444','#a855f7','#06b6d4','#ec4899','#84cc16'];
let currentData = [];
let showCount   = 7;
let currentScope = 'all';

async function apiFetch(url) {
    const token = localStorage.getItem('accessToken');
    const headers = token ? {'Authorization': 'Bearer ' + token} : {};
    const res = await fetch(url, {
        headers: headers,
        credentials: 'include'
    });
    if (res.status === 401) { location.href = '/auth/login'; return null; }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
}

function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadMyRank(scope) {
    try {
        const myRank = await apiFetch('/api/analytics/my-rank?scope='+scope);
        if (!myRank) return;
        document.getElementById('myRankNum').textContent = '#' + myRank.rank;
        document.getElementById('myMajor').textContent   = myRank.major;
        document.getElementById('myScore').textContent   = myRank.totalMinutes + '분';
    } catch(e) { console.warn('내 순위 로드 실패', e); }
}

async function switchScope(btn, scope) {
    btn.closest('.tab-group').querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    btn.classList.add('on');
    currentScope = scope;
    showCount = 7;
    await loadRanking(scope);
    loadMyRank(scope);
}

async function loadRanking(scope) {
    try {
        const data = await apiFetch('/api/analytics/ranking?scope='+scope);
        if (!data) return;
        currentData = data;

        // 내 이름 배너에 표시
        const me = data.find(e => e.me);
        if (me) {
            document.getElementById('myName').textContent = me.username + ' (나)';
        }

        renderPodium();
        renderList();
    } catch(e) {
        document.getElementById('errorMsg').style.display = 'block';
        console.error(e);
    }
}

function loadMore() {
    showCount = Math.min(showCount + 5, Math.max(0, currentData.length - 3));
    renderList();
    if (showCount >= currentData.length - 3) {
        document.getElementById('loadMoreBtn').style.display = 'none';
    }
}

function renderPodium() {
    const top3 = currentData.slice(0, 3);
    const order = [1, 0, 2]; // 2위, 1위, 3위 순 배치
    const podiumCls = [['av2','base2','2위'],['av1','base1','1위'],['av3','base3','3위']];
    document.getElementById('podium').innerHTML = order.map((idx, pos) => {
        const u = top3[idx];
        if (!u) return '';
        const [avCls, baseCls, rankLabel] = podiumCls[pos];
        const crown = pos===1 ? '<span class="podium-crown">👑</span>' : '';
        const initial = u.username ? u.username.charAt(0) : '?';
        return `<div class="podium-item">
          <div class="podium-avatar ${avCls}" style="background:${AVATAR_COLORS[idx%AVATAR_COLORS.length]}">${crown}${esc(initial)}</div>
          <div class="podium-base ${baseCls}">
            <span class="podium-rank">${rankLabel}</span>
            <span class="podium-name">${esc(u.username)}</span>
            <span class="podium-score">${u.totalMinutes}분</span>
          </div>
        </div>`;
    }).join('');
}

function renderList() {
    const maxMin = currentData[0]?.totalMinutes || 1;
    const slice  = currentData.slice(3, showCount + 3);
    document.getElementById('rankList').innerHTML = slice.map((u, i) => {
        const rank = i + 4;
        const pct  = Math.round(u.totalMinutes / maxMin * 100);
        const isMe = u.me;
        const chHtml = u.change > 0
            ? `<span class="rank-change ch-up">↑${u.change}</span>`
            : u.change < 0
            ? `<span class="rank-change ch-dn">↓${Math.abs(u.change)}</span>`
            : `<span class="rank-change ch-same">-</span>`;
        const initial = u.username ? u.username.charAt(0) : '?';
        return `<div class="rank-item${isMe?' is-me':''}">
          <div class="rank-num">${rank}</div>
          <div class="rank-avatar" style="background:${AVATAR_COLORS[rank%AVATAR_COLORS.length]}">${esc(initial)}</div>
          <div class="rank-info">
            <div class="rank-name">${esc(u.username)}${isMe?'<span class="me-tag">나</span>':''}</div>
            <div class="rank-major">${esc(u.major)}</div>
          </div>
          <div class="rank-right">
            <div class="rank-bar-wrap">
              <div class="rank-bar-bg">
                <div class="rank-bar-fill" style="width:${pct}%;background:${isMe?'#4f6ef7':'#9499b5'}"></div>
              </div>
            </div>
            <span class="rank-score">${u.totalMinutes}분</span>
            ${chHtml}
          </div>
        </div>`;
    }).join('');

    const btn = document.getElementById('loadMoreBtn');
    btn.style.display = (currentData.length > showCount + 3) ? 'block' : 'none';
}

// 초기 로드
loadRanking('all');
loadMyRank('all');
</script>
</body>
</html>
