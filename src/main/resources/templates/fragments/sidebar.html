<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="sidebar(active)">
<div class="sidebar">
  <div class="sidebar-logo">Study<span>App</span></div>

  <div class="nav-section">메인</div>
  <a th:href="@{/dashboard}" class="nav-item" th:classappend="${active=='dashboard'}?'active'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    대시보드
  </a>

  <div class="nav-section">학습</div>
  <a th:href="@{/schedule}" class="nav-item" th:classappend="${active=='schedule'}?'active'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    시간표
  </a>
  <a th:href="@{/events}" class="nav-item" th:classappend="${active=='events'}?'active'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    일정 관리
  </a>
  <a th:href="@{/notes}" class="nav-item" th:classappend="${active=='notes'}?'active'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    학습 노트
  </a>
  <a th:href="@{/recommendation}" class="nav-item" th:classappend="${active=='recommendation'}?'active'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    취약 과목 추천
  </a>

  <div class="nav-section">분석</div>
  <a th:href="@{/pages/wrong-answers.html}" class="nav-item" th:classappend="${active=='wrong-answers'}?'active'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    오답 노트
  </a>
  <a th:href="@{/pages/heatmap.html}" class="nav-item" th:classappend="${active=='heatmap'}?'active'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="4" height="4"/><rect x="10" y="3" width="4" height="4"/><rect x="17" y="3" width="4" height="4"/><rect x="3" y="10" width="4" height="4"/><rect x="10" y="10" width="4" height="4"/><rect x="17" y="10" width="4" height="4"/><rect x="3" y="17" width="4" height="4"/><rect x="10" y="17" width="4" height="4"/><rect x="17" y="17" width="4" height="4"/></svg>
    학습 히트맵
  </a>
  <a th:href="@{/pages/statistics.html}" class="nav-item" th:classappend="${active=='statistics'}?'active'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    분석 통계
  </a>
  <a th:href="@{/pages/ranking.html}" class="nav-item" th:classappend="${active=='ranking'}?'active'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
    소셜 랭킹
  </a>

  <div class="sidebar-bottom">
    <div class="user-info">
      <div class="user-avatar">
        <img th:if="${user != null and user.profileImage != null}"
             th:src="${user.profileImage}" alt="프로필">
        <span th:unless="${user != null and user.profileImage != null}"
              th:text="${user != null ? #strings.substring(user.name,0,1) : 'U'}"></span>
      </div>
      <div>
        <div class="user-name" th:text="${user != null ? user.name : '사용자'}"></div>
        <div class="user-role">학생</div>
      </div>
    </div>
    <a th:href="@{/account}" class="nav-item" style="margin-top:4px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      계정 관리
    </a>
    <a href="/auth/logout" class="nav-item" id="logoutBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      로그아웃
    </a>
  </div>
</div>

<script>
// 로그아웃 버튼 - 타이머 저장 후 이동
document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('logoutBtn');
    if (!btn) return;
    btn.addEventListener('click', function(e) {
        e.preventDefault();
        if (localStorage.getItem('studyTimerStatus') === 'running') {
            var startTime = parseInt(localStorage.getItem('studyTimerStart') || '0');
            var savedSec  = parseInt(localStorage.getItem('studyTimerSaved') || '0');
            if (startTime) {
                var elapsed  = Math.floor((Date.now() - startTime) / 1000);
                var totalMin = Math.floor(elapsed / 60);
                var savedMin = Math.floor(savedSec / 60);
                var remain   = totalMin - savedMin;
                if (remain > 0) {
                    navigator.sendBeacon('/api/study-log/save',
                        new Blob([JSON.stringify({minutes: remain})],
                        {type: 'application/json'}));
                }
            }
        }
        ['studyTimerStart','studyTimerSaved','studyTimerStatus',
         'studyTimerTotal','studyTimerDate'].forEach(function(k) {
            localStorage.removeItem(k);
        });
        window.location.href = '/auth/logout';
    });
});
</script>
</th:block>
</body>
</html>
