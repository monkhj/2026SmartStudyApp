<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>시간표 - StudyApp</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/sidebar :: sidebar('schedule')}"></div>
  <main class="main-content">

    <!-- 헤더 -->
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div class="page-title">시간표</div>
        <div class="page-subtitle">셀을 클릭하면 바로 강의를 추가할 수 있습니다</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="openAddModal()">+ 직접 추가</button>
      </div>
    </div>

    <!-- 시간표 그리드 -->
    <div class="card">
      <div style="overflow-x:auto">
        <div class="tt-full" id="timetable">
          <div class="tt-head"></div>
          <div class="tt-head">월</div>
          <div class="tt-head">화</div>
          <div class="tt-head">수</div>
          <div class="tt-head">목</div>
          <div class="tt-head">금</div>
        </div>
      </div>
      <div class="hint-bar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        빈 칸을 클릭하면 해당 시간에 바로 수업을 추가할 수 있어요
      </div>
    </div>

  </main>
</div>

<!-- ════════════════════════════════════════════
     모달 1: 직접 추가
════════════════════════════════════════════ -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">수업 추가</div>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">과목명 <span style="color:var(--danger)">*</span></label>
      <input type="text" id="subjectName" class="form-input" placeholder="예: 자료구조">
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">교수명</label>
        <input type="text" id="professor" class="form-input" placeholder="교수명">
      </div>
      <div class="form-group">
        <label class="form-label">강의실</label>
        <input type="text" id="room" class="form-input" placeholder="예: 공학관 301호">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">요일 <span style="color:var(--danger)">*</span></label>
      <select id="dayOfWeek" class="form-input">
        <option value="1">월요일</option><option value="2">화요일</option>
        <option value="3">수요일</option><option value="4">목요일</option><option value="5">금요일</option>
      </select>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">시작 시간</label>
        <input type="time" id="startTime" class="form-input" value="09:00">
      </div>
      <div class="form-group">
        <label class="form-label">종료 시간</label>
        <input type="time" id="endTime" class="form-input" value="10:30">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">색상</label>
      <div class="color-picker" id="colorPicker">
        <div class="color-dot selected" style="background:#2563eb" data-color="#2563eb" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#7c3aed" data-color="#7c3aed" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#db2777" data-color="#db2777" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#dc2626" data-color="#dc2626" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#d97706" data-color="#d97706" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#16a34a" data-color="#16a34a" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#0891b2" data-color="#0891b2" onclick="selectColor(this)"></div>
        <div class="color-dot" style="background:#475569" data-color="#475569" onclick="selectColor(this)"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal('addModal')">취소</button>
      <button class="btn btn-primary" onclick="addSchedule()">추가</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     모달 2: 과목 메모
════════════════════════════════════════════ -->
<div class="modal-overlay" id="memoModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="memoTitle">과목 상세</div>
      <button class="modal-close" onclick="closeModal('memoModal')">×</button>
    </div>
    <div id="memoInfo" style="background:var(--bg);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--text-sub)"></div>
    <div class="form-group">
      <label class="form-label">📝 메모</label>
      <textarea id="memoContent" class="form-input" rows="5" placeholder="수업 관련 메모..." style="resize:vertical"></textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:space-between;margin-top:8px">
      <button class="btn btn-danger btn-sm" onclick="deleteSchedule()">삭제</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="closeModal('memoModal')">닫기</button>
        <button class="btn btn-primary" onclick="saveMemo()">저장</button>
      </div>
    </div>
  </div>
</div>



<!-- JavaScript
════════════════════════════════════════════ -->
<script th:inline="javascript">
const schedules = /*[[${schedules}]]*/ [];
const START_HOUR = 8, END_HOUR = 22, CELL_H = 48;

let selectedColor = '#2563eb';
let currentScheduleId = null;

// ─────────────────────────────
// 시간표 렌더링
// ─────────────────────────────
function renderTimetable() {
    const grid = document.getElementById('timetable');
    // 기존 내용 삭제
    grid.innerHTML = '<div class="tt-head"></div><div class="tt-head">월</div><div class="tt-head">화</div><div class="tt-head">수</div><div class="tt-head">목</div><div class="tt-head">금</div>';
    
    // 시간대별 컨테이너 생성
    for (let h = START_HOUR; h <= END_HOUR; h++) {
        // 시간 라벨
        const tl = document.createElement('div');
        tl.className = 'tt-time-label';
        tl.style.height = '48px'; // 30분*2 셀 높이 합계
        tl.textContent = `${String(h).padStart(2, '0')}:00`;
        grid.appendChild(tl);

        // 요일별 슬롯 (30분 단위로 h, m 쪼개기)
        for (let d = 1; d <= 5; d++) {
            const col = document.createElement('div');
            col.className = 'tt-day-col';
            col.style.position = 'relative';
            col.dataset.d = d; // ★ 핵심 원인 해결: 요일 이름표(data-d) 달아주기
            
            // 0분, 30분 슬롯 생성
            [0, 30].forEach(m => {
                const slot = document.createElement('div');
                slot.className = 'tt-slot';
                slot.style.height = '24px';
                slot.dataset.h = h;
                slot.dataset.m = m;
                slot.dataset.d = d;
                slot.addEventListener('click', () => openAddModalAt(d, h, m));
                col.appendChild(slot);
            });
            grid.appendChild(col);
        }
    }
    schedules.forEach(renderBlock);
}

function renderBlock(s) {
    const grid = document.getElementById('timetable');
    
    // 요일(data-d)로 정확한 컨테이너 찾기
    const container = grid.querySelector(`.tt-day-col[data-d="${s.dayOfWeek}"]`);
    if (!container) return; // 컨테이너를 못 찾으면 안 그려짐 (이제 무조건 찾음)

    const block = document.createElement('div');
    block.className = 'tt-block';
    
    // 30분 단위 그리드에 맞춘 완벽한 위치 계산 (시간당 48px, 30분당 24px)
    const topOffset = (s.startHour - START_HOUR) * 48 + (s.startMinute / 30) * 24;
    const duration = ((s.endHour * 60 + s.endMinute) - (s.startHour * 60 + s.startMinute)) / 30 * 24;
    
    block.style.cssText = `
        background:${s.color || '#2563eb'};
        top:${topOffset}px;
        height:${duration - 2}px;
        position:absolute;
        left:4px;
        right:4px;
        z-index:10;
    `;
    
    // 블록 내부 글씨 안 깨지게 처리
    block.innerHTML = `
        <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${s.subjectName}</div>
        <div style="font-size:10px; opacity:0.8;">${s.room || ''}</div>
    `;
    block.onclick = e => { e.stopPropagation(); openMemoModal(s); };
    
    container.appendChild(block);
}

// ─────────────────────────────
// 모달 유틸
// ─────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function openModal(id)  { document.getElementById(id).classList.add('active'); }

function selectColor(el) {
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = el.dataset.color;
}

// ─────────────────────────────
// 직접 추가 모달
// ─────────────────────────────
function openAddModal() {
  resetAddForm();
  openModal('addModal');
}

function openAddModalAt(day, hour) {
  resetAddForm();
  document.getElementById('dayOfWeek').value = String(day);
  document.getElementById('startTime').value = `${String(hour).padStart(2,'0')}:00`;
  document.getElementById('endTime').value   = `${String(Math.min(hour+1,23)).padStart(2,'0')}:30`;
  openModal('addModal');
  setTimeout(() => document.getElementById('subjectName').focus(), 80);
}

function resetAddForm() {
  ['subjectName','professor','room'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('dayOfWeek').value = '1';
  document.getElementById('startTime').value = '09:00';
  document.getElementById('endTime').value   = '10:30';
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  document.querySelector('.color-dot').classList.add('selected');
  selectedColor = '#2563eb';
}

async function addSchedule() {
  const name = document.getElementById('subjectName').value.trim();
  if (!name) { alert('과목명을 입력하세요.'); return; }
  const [sh,sm] = document.getElementById('startTime').value.split(':').map(Number);
  const [eh,em] = document.getElementById('endTime').value.split(':').map(Number);
  if (eh*60+em <= sh*60+sm) { alert('종료 시간이 시작 시간보다 늦어야 합니다.'); return; }

  const body = {
    subjectName: name,
    professor: document.getElementById('professor').value,
    room: document.getElementById('room').value,
    dayOfWeek: parseInt(document.getElementById('dayOfWeek').value),
    startHour:sh, startMinute:sm, endHour:eh, endMinute:em,
    color: selectedColor
  };
  const res = await fetch('/schedule/add', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  });
  if (res.ok) {
    schedules.push(await res.json());
    renderTimetable();
    closeModal('addModal');
  } else alert('추가 실패. 다시 시도해주세요.');
}

// ─────────────────────────────
// 메모 모달
// ─────────────────────────────
function openMemoModal(s) {
  currentScheduleId = s.id;
  document.getElementById('memoTitle').textContent = s.subjectName;
  document.getElementById('memoInfo').innerHTML =
    `<strong>요일:</strong> ${['','월','화','수','목','금'][s.dayOfWeek]} &nbsp;|&nbsp;
     <strong>시간:</strong> ${String(s.startHour).padStart(2,'0')}:${String(s.startMinute).padStart(2,'0')} ~ ${String(s.endHour).padStart(2,'0')}:${String(s.endMinute).padStart(2,'0')}<br>
     <strong>교수:</strong> ${s.professor||'-'} &nbsp;|&nbsp; <strong>강의실:</strong> ${s.room||'-'}`;
  document.getElementById('memoContent').value = s.memo || '';
  openModal('memoModal');
}

async function saveMemo() {
  const memo = document.getElementById('memoContent').value;
  const res = await fetch(`/schedule/${currentScheduleId}/memo`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({memo})
  });
  if (res.ok) {
    const idx = schedules.findIndex(s => s.id === currentScheduleId);
    if (idx > -1) schedules[idx].memo = memo;
    closeModal('memoModal');
  } else alert('저장 실패.');
}

async function deleteSchedule() {
  if (!confirm('이 수업을 삭제하시겠습니까?')) return;
  const res = await fetch(`/schedule/${currentScheduleId}`, { method:'DELETE' });
  if (res.ok) {
    const idx = schedules.findIndex(s => s.id === currentScheduleId);
    if (idx > -1) schedules.splice(idx, 1);
    renderTimetable();
    closeModal('memoModal');
  }
}

// 초기 렌더링
renderTimetable();
</script>
</body>
</html>
