<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${note != null ? note.title : '새 노트 작성'} + ' — Smart Study AI'">Smart Study AI</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .note-form-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px 28px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:20px; }
        .card-label { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-sub);margin-bottom:12px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block;font-size:13px;font-weight:600;color:var(--text-main);margin-bottom:6px; }
        .form-group input, .form-group textarea { width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;background:var(--surface);color:var(--text-main); }
        .form-group input:focus, .form-group textarea:focus { border-color:var(--primary); }
        .form-group textarea { height:200px;resize:vertical;line-height:1.6; }
        .meta-row { display:flex;gap:12px; }
        .meta-row .form-group { flex:1; }
        .btn-row { display:flex;gap:12px;margin-top:8px; }
        .btn-analyze {
            flex:2; padding:14px; border:none; border-radius:10px;
            font-size:15px; font-weight:700; cursor:pointer;
            background:linear-gradient(135deg,#4f6ef7,#7c3aed);
            color:#fff; box-shadow:0 4px 14px rgba(79,110,247,.4);
            transition:all .2s; letter-spacing:.3px;
        }
        .btn-analyze:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(79,110,247,.5); }
        .btn-analyze:active { transform:translateY(0); }
        .btn-analyze:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }
        .btn-save-only {
            flex:1; padding:14px; border-radius:10px;
            font-size:14px; font-weight:600; cursor:pointer;
            background:#fff; color:#4f6ef7;
            border:2px solid #4f6ef7; transition:all .2s;
        }
        .btn-save-only:hover { background:#ebf4ff; }
        .btn-save-only:disabled { opacity:.5; cursor:not-allowed; }

        #spinner { text-align:center;padding:32px;color:var(--text-sub);font-size:14px;display:none; }
        .spinner-dot { display:inline-block;animation:pulse 1.4s ease-in-out infinite; }
        .spinner-dot:nth-child(2) { animation-delay:.2s; }
        .spinner-dot:nth-child(3) { animation-delay:.4s; }
        @keyframes pulse { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
        .error-box { background:#fff5f5;border:1px solid #feb2b2;color:#c53030;padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none; }

        .note-page-title { font-size:22px;font-weight:700;color:var(--text-main);margin-bottom:20px; }
        .original-text { line-height:1.85;color:var(--text-main);white-space:pre-wrap;word-break:break-word; }
        .ai-summary-text { line-height:1.85;color:#2b6cb0;font-weight:500;white-space:pre-wrap;word-break:break-word;background:#ebf8ff;padding:16px 18px;border-radius:8px;border-left:4px solid #3182ce; }
        .keywords-wrap { display:flex;flex-wrap:wrap;gap:8px; }
        .keyword-tag { background:#ebf4ff;color:#2b6cb0;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600; }
        .action-row { display:flex;gap:12px;align-items:center;margin-top:8px; }
        .btn-quiz {
            display:inline-block; background:linear-gradient(135deg,#10b981,#059669);
            color:#fff !important; padding:12px 24px; border-radius:10px;
            font-size:14px; font-weight:700; border:none; cursor:pointer;
            transition:all .2s; text-decoration:none;
            box-shadow:0 4px 12px rgba(16,185,129,.35);
        }
        .btn-quiz:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(16,185,129,.45); }
        .btn-to-list { display:inline-block;background:var(--surface);color:var(--text-main);padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;border:2px solid var(--border);text-decoration:none;transition:all .2s; }
        .btn-to-list:hover { border-color:#48bb78;color:#2f855a; }

        .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px; }
        .modal-overlay.open { display:flex; }
        .modal { background:var(--surface);border-radius:16px;width:100%;max-width:620px;max-height:85vh;overflow-y:auto;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.3); }
        .modal-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:24px; }
        .modal-header h2 { font-size:18px;font-weight:700; }
        .btn-close { background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-sub);line-height:1;padding:4px; }

        .quiz-item { border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:14px; }
        .quiz-item.prev-wrong-item { border-color:#fbd38d;background:#fffbeb; }
        .prev-wrong-badge { display:inline-block;background:#fef3c7;color:#92400e;border:1px solid #fbbf24;padding:2px 9px;border-radius:4px;font-size:11px;font-weight:700;margin-bottom:8px; }
        .q-label { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px; }
        .q-label.label-ox { color:#6b46c1; } .q-label.label-short { color:#2f855a; }
        .q-text { font-weight:500;line-height:1.55;margin-bottom:14px; }
        .ox-btns { display:flex;gap:10px; }
        .ox-btns button { flex:1;padding:10px;border:2px solid var(--border);border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;background:var(--surface);transition:all .15s; }
        .ox-btns button:hover:not(:disabled) { background:var(--bg); }
        .ox-btns button:disabled { cursor:not-allowed;opacity:.7; }
        .short-row { display:flex;gap:8px; }
        .short-row input { flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;outline:none;background:var(--surface);color:var(--text-main); }
        .short-row button { padding:9px 16px;background:var(--primary);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;white-space:nowrap; }
        .short-row button:disabled { opacity:.5;cursor:not-allowed; }
        .feedback { margin-top:10px;padding:8px 12px;border-radius:6px;font-size:13px;font-weight:600;display:none; }
        .feedback.correct { background:#f0fff4;color:#2f855a;border:1px solid #c6f6d5; }
        .feedback.wrong   { background:#fff5f5;color:#c53030;border:1px solid #fed7d7; }
        .feedback.reveal  { background:#ebf8ff;color:#2b6cb0;border:1px solid #bee3f8; }
        .quiz-score { text-align:center;padding:20px;background:var(--bg);border-radius:10px;margin-top:16px;font-size:14px;color:var(--text-main);display:none; }
        .quiz-score strong { color:var(--primary);font-size:22px;display:block;margin-bottom:16px; }
        .btn-save-exit { width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s; }
        .btn-save-exit:hover { opacity:.9; }
    </style>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar('notes')}"></div>

    <main class="main-content">

        <!-- ── 새 노트 작성 ── -->
        <div th:if="${note == null}">
            <div class="page-header">
                <div>
                    <div class="page-title">📝 새 노트 작성</div>
                    <div class="page-subtitle">노트를 입력하면 AI가 요약과 퀴즈를 자동으로 생성합니다</div>
                </div>
                <a href="/notes" class="btn btn-secondary">← 목록으로</a>
            </div>

            <div id="formSection" class="note-form-card">
                <div class="form-group">
                    <label for="noteTitle">노트 제목</label>
                    <input id="noteTitle" type="text" placeholder="예: 광합성의 원리">
                </div>
                <div class="meta-row">
                    <div class="form-group">
                        <label for="subjectId">과목</label>
                        <select id="subjectId" class="form-input">
                            <option value="general">-- 과목 선택 --</option>
                            <option th:each="s : ${subjects}"
                                    th:value="${s}"
                                    th:text="${s}"></option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="noteContent">노트 내용</label>
                    <textarea id="noteContent" placeholder="분석할 노트 내용을 입력하세요..."></textarea>
                </div>
                <div id="errorBox" class="error-box"></div>
                <div class="btn-row">
                    <button class="btn-save-only" id="saveOnlyBtn" onclick="saveOnly()">💾 저장만 하기</button>
                    <button class="btn-analyze" id="analyzeBtn" onclick="startAnalyze()">✨ AI 분석 시작</button>
                </div>
            </div>
            <div id="spinner">
                <span class="spinner-dot">●</span>
                <span class="spinner-dot">●</span>
                <span class="spinner-dot">●</span>
                <br><br>AI가 노트를 분석 중입니다...
            </div>
        </div>

        <!-- ── 노트 상세 ── -->
        <div th:if="${note != null}">
            <div class="page-header">
                <div>
                    <div class="page-title" th:text="${note.title != null and !note.title.isBlank() ? note.title : '제목 없음'}">노트 제목</div>
                    <div class="page-subtitle" th:text="${note.createdAt != null ? note.createdAt.toLocalDate() : ''}"></div>
                </div>
                <a href="/notes" class="btn btn-secondary">← 목록으로</a>
            </div>

            <div class="note-form-card">
                <div class="card-label">원본 노트</div>
                <p class="original-text" th:text="${note.originalText}"></p>
            </div>

            <!-- AI 미분석 -->
            <div th:if="${note.summary == null}">
                <div id="analyzeSpinner" style="display:none;text-align:center;padding:24px;color:var(--text-sub)">
                    <span class="spinner-dot">●</span><span class="spinner-dot">●</span><span class="spinner-dot">●</span>
                    <br><br>AI가 분석 중입니다...
                </div>
                <div id="analyzeErrorBox" class="error-box"></div>
                <div class="action-row">
                    <button id="analyzeExistingBtn" class="btn-quiz" onclick="analyzeExisting()">✨ AI 분석 시작</button>
                    <a href="/notes" class="btn-to-list">목록으로</a>
                </div>
            </div>

            <!-- AI 요약 -->
            <div class="note-form-card" th:if="${note.summary != null}">
                <div class="card-label">AI 요약</div>
                <p class="ai-summary-text" th:text="${note.summary}"></p>
            </div>

            <!-- 키워드 -->
            <div class="note-form-card" th:if="${note.keywords != null and !note.keywords.isEmpty()}">
                <div class="card-label">핵심 키워드</div>
                <div class="keywords-wrap">
                    <span th:each="kw : ${note.keywords}" class="keyword-tag" th:text="${kw}"></span>
                </div>
            </div>

            <!-- 퀴즈 버튼 -->
            <div th:if="${note.summary != null}" class="action-row">
                <button th:if="${note.questions != null and !note.questions.isEmpty()}"
                        id="openQuizBtn" class="btn-quiz">📝 퀴즈 풀기</button>
                <a href="/notes" class="btn-to-list">✓ 저장 완료 &amp; 목록으로</a>
            </div>

            <script th:inline="javascript">
                /*<![CDATA[*/
                var SERVER_QUIZ  = /*[[${note.questions}]]*/ [];
                var PREV_WRONG   = /*[[${note.wrongAnswerIndices}]]*/ [];
                var NOTE_ID      = /*[[${note.id}]]*/ '';
                var NOTE_SUBJECT = /*[[${note.subjectId}]]*/ '';
                /*]]>*/
            </script>
        </div>

    </main>
</div>

<!-- 퀴즈 모달 -->
<div id="quizModal" class="modal-overlay">
    <div class="modal" style="display:flex;flex-direction:column;max-height:90vh;padding:0;">
        <!-- 헤더 (고정) -->
        <div class="modal-header" style="padding:24px 32px 16px;border-bottom:1px solid var(--border);flex-shrink:0;">
            <h2>📝 AI 생성 퀴즈</h2>
            <button class="btn-close" onclick="closeQuiz()">✕</button>
        </div>
        <!-- 퀴즈 내용 (스크롤) -->
        <div id="quizContent" style="overflow-y:auto;flex:1;padding:24px 32px;"></div>
        <!-- 점수 결과 -->
        <div id="quizScore" class="quiz-score" style="margin:0;padding:16px 32px 0;border-top:1px solid var(--border);display:none;">
            <strong id="scoreText"></strong>
        </div>
        <!-- 하단 버튼 (항상 보임) -->
        <div style="padding:16px 32px 24px;flex-shrink:0;display:flex;gap:10px;">
            <button id="submitAllBtn" class="btn-save-exit"
                style="flex:2;background:linear-gradient(135deg,#4f6ef7,#7c3aed);
                       color:#fff;font-size:15px;font-weight:800;
                       box-shadow:0 4px 16px rgba(79,110,247,.5);
                       border:none;border-radius:10px;padding:14px;cursor:pointer;
                       letter-spacing:.3px;transition:all .2s;"
                onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(79,110,247,.6)'"
                onmouseout="this.style.transform='';this.style.boxShadow='0 4px 16px rgba(79,110,247,.5)'"
                onclick="submitAll()">
                ✅ 제출하기
            </button>
            <button class="btn-save-exit" id="saveExitBtn"
                style="flex:1;display:none;background:#10b981;">
                💾 저장하고 나가기
            </button>
        </div>
    </div>
</div>

<script>
async function analyzeExisting() {
    var noteId = (typeof NOTE_ID !== 'undefined') ? NOTE_ID : '';
    if (!noteId) return;
    var btn = document.getElementById('analyzeExistingBtn');
    var spinner = document.getElementById('analyzeSpinner');
    var errBox = document.getElementById('analyzeErrorBox');
    btn.parentElement.style.display = 'none';
    errBox.style.display = 'none';
    spinner.style.display = 'block';
    try {
        var res = await fetch('/notes/' + noteId + '/analyze', { method: 'POST' });
        if (!res.ok) throw new Error('분석 실패 (' + res.status + ')');
        window.location.reload();
    } catch (err) {
        spinner.style.display = 'none';
        btn.parentElement.style.display = 'flex';
        errBox.textContent = err.message;
        errBox.style.display = 'block';
    }
}

async function saveOnly() {
    var title   = document.getElementById('noteTitle')?.value.trim();
    var subjectEl = document.getElementById('subjectId');
    var subject = (subjectEl?.value && subjectEl.value.trim() !== '' && subjectEl.value !== 'general')
        ? subjectEl.value.trim() : '기타';
    var text    = document.getElementById('noteContent')?.value.trim();
    hideError();
    if (!title) { showError('노트 제목을 입력해주세요.'); return; }
    if (!text)  { showError('노트 내용을 입력해주세요.'); return; }
    setFormLoading(true);
    try {
        var res = await fetch('/notes/save', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: title, userId: 'user01', subjectId: subject, text: text })
        });
        if (!res.ok) throw new Error('저장 실패 (' + res.status + ')');
        window.location.href = '/notes';
    } catch (err) { setFormLoading(false); showError(err.message); }
}

async function startAnalyze() {
    var title   = document.getElementById('noteTitle')?.value.trim();
    var subjectEl = document.getElementById('subjectId');
    var subject = (subjectEl?.value && subjectEl.value.trim() !== '' && subjectEl.value !== 'general')
        ? subjectEl.value.trim() : '기타';
    var text    = document.getElementById('noteContent')?.value.trim();
    hideError();
    if (!title) { showError('노트 제목을 입력해주세요.'); return; }
    if (!text)  { showError('노트 내용을 입력해주세요.'); return; }
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('spinner').style.display = 'block';
    try {
        var res = await fetch('/notes/analyze', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: title, userId: 'user01', subjectId: subject, text: text })
        });
        if (!res.ok) throw new Error('서버 오류 (' + res.status + ')');
        var note = await res.json();
        window.location.href = '/notes/' + note.id;
    } catch (err) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('formSection').style.display = 'block';
        showError(err.message);
    }
}

function setFormLoading(on) {
    document.getElementById('analyzeBtn').disabled = on;
    document.getElementById('saveOnlyBtn').disabled = on;
}
function showError(msg) { var b = document.getElementById('errorBox'); if(b){b.textContent=msg;b.style.display='block';} }
function hideError() { var b = document.getElementById('errorBox'); if(b) b.style.display='none'; }

var _wrongIndices = [];
var _allAnswers = [];

function openQuiz(questions) {
    _wrongIndices = [];
    _allAnswers = [];
    renderQuiz(questions);
    document.getElementById('quizScore').style.display = 'none';
    document.getElementById('quizModal').classList.add('open');
}
function closeQuiz() { document.getElementById('quizModal').classList.remove('open'); }

function renderQuiz(questions) {
    var container = document.getElementById('quizContent');
    container.innerHTML = '';
    var prevWrong = (typeof PREV_WRONG !== 'undefined' && PREV_WRONG) ? PREV_WRONG : [];
    questions.forEach(function(q, i) {
        var wasPrevWrong = prevWrong.indexOf(i) !== -1;
        var isOX = q.type === 'ox';
        var item = document.createElement('div');
        item.className = 'quiz-item' + (wasPrevWrong ? ' prev-wrong-item' : '');
        item.dataset.answer = q.answer;
        item.dataset.type = q.type;
        item.dataset.index = i;
        item.dataset.question = q.question;
        item.dataset.explanation = q.explanation || '';
        item.dataset.wasCorrect = '';
        item.dataset.userAnswer = '';

        var inner = (wasPrevWrong ? '<div class="prev-wrong-badge">⚠ 이전에 틀린 문제</div>' : '')
            + '<div class="q-label ' + (isOX ? 'label-ox' : 'label-short') + '">'
            + (isOX ? 'O / X' : '단답형') + ' — Q' + (i+1) + '</div>'
            + '<div class="q-text">' + escHtml(q.question) + '</div>';

        if (isOX) {
            inner += '<div class="ox-btns">'
                + '<button data-val="O" style="font-size:22px;padding:10px 28px;">O</button>'
                + '<button data-val="X" style="font-size:22px;padding:10px 28px;">X</button>'
                + '</div>';
        } else {
            inner += '<div class="short-row">'
                + '<input type="text" placeholder="답을 입력하세요">'
                + '<button class="check-btn" style="padding:9px 18px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">확인</button>'
                + '</div>';
        }
        inner += '<div class="feedback"></div>';
        item.innerHTML = inner;

        if (isOX) {
            item.querySelectorAll('.ox-btns button').forEach(function(btn) {
                btn.addEventListener('click', function() { checkOX(item, btn.dataset.val); });
            });
        } else {
            var input = item.querySelector('input');
            var checkBtn = item.querySelector('.check-btn');
            checkBtn.addEventListener('click', function() {
                checkShort(item, input.value.trim());
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') checkShort(item, input.value.trim());
            });
        }
        container.appendChild(item);
    });
}

function checkOX(item, selected) {
    var correct = item.dataset.answer;
    var isCorrect = selected === correct;
    item.dataset.wasCorrect = isCorrect ? 'true' : 'false';
    item.dataset.userAnswer = selected;
    showFeedback(item, isCorrect ? 'correct' : 'wrong',
        isCorrect ? '✓ 정답입니다!' : '✗ 오답 (정답: ' + correct + ')');
    item.querySelectorAll('button').forEach(function(b) { b.disabled = true; });
    maybeShowScore();
}

function normalize(str) {
    return str.toLowerCase()
        .replace(/[\s\-_·,\.]/g, '')   // 공백·특수문자 제거
        .replace(/[은는이가을를의]/g, ''); // 조사 제거
}

function checkShort(item, userInput) {
    if (!userInput) { item.querySelector('input').focus(); return; }
    var correct = item.dataset.answer;

    var normUser    = normalize(userInput);
    var normCorrect = normalize(correct);

    // 채점 기준: 완전 일치 OR 정답이 입력에 포함 OR 입력이 정답에 포함 (2글자 이상)
    var isCorrect = normUser === normCorrect
        || (normCorrect.length >= 2 && normUser.includes(normCorrect))
        || (normUser.length >= 2 && normCorrect.includes(normUser));

    item.dataset.wasCorrect = isCorrect ? 'true' : 'false';
    item.dataset.userAnswer = userInput;
    showFeedback(item, isCorrect ? 'correct' : 'reveal',
        isCorrect ? '✓ 정답입니다!' : '정답: ' + correct);
    item.querySelector('.check-btn').disabled = true;
    item.querySelector('input').disabled = true;
    maybeShowScore();
}

function showFeedback(item, cls, text) {
    var fb = item.querySelector('.feedback');
    fb.className = 'feedback ' + cls;
    fb.textContent = text;
    fb.style.display = 'block';
}

function maybeShowScore() {
    var items = document.querySelectorAll('#quizContent .quiz-item');
    var answered = Array.from(items).filter(function(it) {
        return it.dataset.wasCorrect !== '';
    });
    // 모든 문제 답했으면 자동으로 제출
    if (answered.length === items.length) {
        showScore();
    }
}

function submitAll() {
    var items = document.querySelectorAll('#quizContent .quiz-item');
    var unanswered = Array.from(items).filter(function(it) {
        return it.dataset.wasCorrect === '';
    }).length;

    // 안 푼 문제가 있으면 확인
    if (unanswered > 0) {
        if (!confirm(unanswered + '개 문제를 아직 풀지 않았어요.\n제출하면 미응답 문제는 오답 처리됩니다.\n제출하시겠습니까?')) {
            return;
        }
    }

    // 안 푼 문제 오답 처리
    Array.from(items).forEach(function(item) {
        if (item.dataset.wasCorrect === '') {
            item.dataset.wasCorrect = 'false';
            item.dataset.userAnswer = '';
            showFeedback(item, 'wrong', '미응답 (정답: ' + item.dataset.answer + ')');
            item.querySelectorAll('button').forEach(function(b) { b.disabled = true; });
            var input = item.querySelector('input[type=text]');
            if (input) input.disabled = true;
        }
    });
    showScore();
}

function showScore() {
    var items = document.querySelectorAll('#quizContent .quiz-item');
    var correctCount = 0;
    _wrongIndices = [];
    _allAnswers = [];

    Array.from(items).forEach(function(item) {
        var isCorrect = item.dataset.wasCorrect === 'true';
        if (isCorrect) correctCount++;
        else _wrongIndices.push(parseInt(item.dataset.index));

        _allAnswers.push({
            questionText:  item.dataset.question,
            userAnswer:    item.dataset.userAnswer || '',
            correctAnswer: item.dataset.answer,
            explanation:   item.dataset.explanation || ('정답: ' + item.dataset.answer),
            correct:       isCorrect
        });
    });

    document.getElementById('scoreText').textContent =
        '🎯 최종 점수: ' + correctCount + ' / ' + items.length;
    document.getElementById('quizScore').style.display = 'block';
    // 제출 버튼 숨기고 저장 버튼 표시
    document.getElementById('submitAllBtn').style.display = 'none';
    document.getElementById('saveExitBtn').style.display = 'flex';
    // 저장 버튼으로 스크롤
    document.getElementById('saveExitBtn').scrollIntoView({behavior:'smooth'});
}

document.getElementById('saveExitBtn').addEventListener('click', async function() {
    var noteId = (typeof NOTE_ID !== 'undefined') ? NOTE_ID : '';
    if (noteId) {
        try {
            await fetch('/notes/' + noteId + '/quiz-result', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    wrongIndices: _wrongIndices,
                    answers: _allAnswers
                })
            });
        } catch (e) { console.warn('저장 실패', e); }
    }
    window.location.href = '/notes';
});

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('DOMContentLoaded', function() {
    var openBtn = document.getElementById('openQuizBtn');
    if (openBtn) {
        openBtn.addEventListener('click', function() {
            openQuiz(typeof SERVER_QUIZ !== 'undefined' ? SERVER_QUIZ : []);
        });
    }
    if (window.location.hash === '#quiz' &&
        typeof SERVER_QUIZ !== 'undefined' && SERVER_QUIZ.length > 0) {
        openQuiz(SERVER_QUIZ);
    }
});
</script>
<script>
// ── 노트 열람 시간 → 과목별 학습 시간 기록 (대시보드 타이머 실행 중일 때만) ──
(function() {
    const subject = (typeof NOTE_SUBJECT !== 'undefined') ? NOTE_SUBJECT : '';
    if (!subject || subject === 'general') return;

    // 대시보드 타이머 실행 중인지 확인
    function isDashboardTimerRunning() {
        return localStorage.getItem('studyTimerStatus') === 'running';
    }

    // localStorage로 노트 시작 시간 관리 (재진입 시 유지)
    const NOTE_START_KEY = 'noteStudyStart_' + subject;
    const NOTE_SAVED_KEY = 'noteStudySaved_' + subject;

    // 타이머 실행 중일 때만 시작 시간 기록
    if (isDashboardTimerRunning()) {
        if (!localStorage.getItem(NOTE_START_KEY)) {
            localStorage.setItem(NOTE_START_KEY, Date.now());
            localStorage.setItem(NOTE_SAVED_KEY, '0');
        }
    }

    async function save(minutes) {
        if (minutes <= 0) return;
        try {
            await fetch('/api/study-log/save-subject', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'same-origin',
                body: JSON.stringify({minutes: minutes, subjectId: subject})
            });
        } catch(e) {}
    }

    // 1분마다 체크 - 타이머 실행 중이고 노트 시작 시간 있을 때만 저장
    setInterval(() => {
        if (!isDashboardTimerRunning()) return;
        const startTime = parseInt(localStorage.getItem(NOTE_START_KEY) || '0');
        if (!startTime) return;
        const savedSec = parseInt(localStorage.getItem(NOTE_SAVED_KEY) || '0');
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const newMin = Math.floor(elapsed / 60) - Math.floor(savedSec / 60);
        if (newMin > 0) {
            localStorage.setItem(NOTE_SAVED_KEY, String(elapsed));
            save(newMin);
        }
    }, 60000);

    // 페이지 이탈 시 타이머 실행 중이면 남은 시간 저장
    window.addEventListener('beforeunload', () => {
        if (!isDashboardTimerRunning()) return;
        const startTime = parseInt(localStorage.getItem(NOTE_START_KEY) || '0');
        if (!startTime) return;
        const savedSec = parseInt(localStorage.getItem(NOTE_SAVED_KEY) || '0');
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const remain = Math.floor(elapsed / 60) - Math.floor(savedSec / 60);
        if (remain > 0) {
            navigator.sendBeacon('/api/study-log/save-subject',
                new Blob([JSON.stringify({minutes: remain, subjectId: subject})],
                {type: 'application/json'}));
            localStorage.setItem(NOTE_SAVED_KEY, String(elapsed));
        }
    });
})();
</script>
