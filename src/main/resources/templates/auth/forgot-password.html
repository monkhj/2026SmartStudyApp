<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 찾기 - StudyApp</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="auth-container">
  <div class="auth-card" style="width:420px">
    <div class="auth-logo">Study<span>App</span></div>
    <div class="auth-subtitle">비밀번호 찾기</div>

    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <p style="font-size:13px; color:var(--text-sub); margin-bottom:20px; line-height:1.7">
      가입 시 등록한 이메일 주소를 입력하면<br>비밀번호 재설정 링크를 보내드립니다.
    </p>

    <form th:action="@{/auth/forgot-password}" method="post">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" name="email" class="form-input"
               placeholder="가입한 이메일을 입력하세요" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary"
              style="width:100%; justify-content:center; padding:12px; margin-top:4px;">
        재설정 링크 전송
      </button>
    </form>

    <div class="auth-footer" style="margin-top:24px">
      <a th:href="@{/auth/login}">← 로그인으로 돌아가기</a>
    </div>
  </div>
</div>
</body>
</html>
