<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인 - StudyApp</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .forgot-row { display:flex; align-items:center; justify-content:space-between; margin-top:6px; }
    .forgot-link { font-size:13px; color:var(--accent); text-decoration:none; }
    .forgot-link:hover { text-decoration:underline; }
    .register-link { font-size:13px; color:var(--accent); text-decoration:none; }
    .register-link:hover { text-decoration:underline; }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo-row">
      <div class="auth-logo">Study<span>App</span></div>
      <div class="auth-subtitle">개인 학습 관리 시스템</div>
    </div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form th:action="@{/auth/login}" method="post">
      <div class="form-group">
        <label class="form-label">아이디</label>
        <input type="text" name="username" class="form-input"
               placeholder="아이디를 입력하세요" required autofocus>
      </div>
      <div class="form-group" style="margin-bottom:8px">
        <label class="form-label">비밀번호</label>
        <input type="password" name="password" class="form-input"
               placeholder="비밀번호를 입력하세요" required>
      </div>

      <div class="forgot-row" style="margin-bottom:18px">
        <a th:href="@{/auth/register}" class="register-link">회원가입</a>
        <a th:href="@{/auth/forgot-password}" class="forgot-link">비밀번호 찾기</a>
      </div>

      <button type="submit" class="btn btn-primary"
              style="width:100%;justify-content:center;padding:13px;font-size:15px;border-radius:10px;">
        로그인
      </button>
    </form>
  </div>
</div>
<script>
// 로그인 페이지 접속 시 타이머 상태 초기화
['studyTimerStart','studyTimerSaved','studyTimerStatus',
 'studyTimerTotal','studyTimerDate'].forEach(k => localStorage.removeItem(k));
</script>
</body>
</html>
