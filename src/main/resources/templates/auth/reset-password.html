<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 재설정 - StudyApp</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="auth-container">
  <div class="auth-card" style="width:420px">
    <div class="auth-logo">Study<span>App</span></div>
    <div class="auth-subtitle">새 비밀번호 설정</div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/auth/reset-password}" method="post">
      <input type="hidden" name="token" th:value="${token}">

      <div class="form-group">
        <label class="form-label">새 비밀번호</label>
        <input type="password" name="newPassword" class="form-input"
               placeholder="8자 이상" required minlength="8">
      </div>
      <div class="form-group">
        <label class="form-label">새 비밀번호 확인</label>
        <input type="password" name="confirmPassword" class="form-input"
               placeholder="비밀번호를 다시 입력하세요" required>
      </div>

      <button type="submit" class="btn btn-primary"
              style="width:100%; justify-content:center; padding:12px; margin-top:4px;">
        비밀번호 변경
      </button>
    </form>
  </div>
</div>
</body>
</html>
