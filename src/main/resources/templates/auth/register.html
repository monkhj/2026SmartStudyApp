<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입 - StudyApp</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="auth-container">
  <div class="auth-card" style="width:440px">
    <div class="auth-logo">Study<span>App</span></div>
    <div class="auth-subtitle">새 계정 만들기</div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <form th:action="@{/auth/register}" method="post">
      <div class="form-group"><label class="form-label">이름</label>
        <input type="text" name="name" class="form-input" placeholder="실명" required></div>
      <div class="form-group"><label class="form-label">아이디</label>
        <input type="text" name="username" class="form-input" placeholder="영문·숫자 조합" required></div>
      <div class="form-group"><label class="form-label">이메일</label>
        <input type="email" name="email" class="form-input" placeholder="example@email.com" required></div>
      <div class="form-group"><label class="form-label">전공 <span style="color:var(--text-sub);font-weight:400;font-size:12px">(선택 · 소셜 랭킹 필터에 사용)</span></label>
        <input type="text" name="major" class="form-input" placeholder="예: 컴퓨터공학과"></div>
      <div class="form-group"><label class="form-label">비밀번호</label>
        <input type="password" name="password" class="form-input" placeholder="8자 이상" required minlength="8"></div>
      <div class="form-group"><label class="form-label">비밀번호 확인</label>
        <input type="password" name="confirmPassword" class="form-input" placeholder="비밀번호 재입력" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">회원가입</button>
    </form>
    <div class="auth-footer">이미 계정이 있으신가요? <a th:href="@{/auth/login}">로그인</a></div>
  </div>
</div>
</body>
</html>
